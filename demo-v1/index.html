<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnostic IA — NorbeX Systems</title>
<meta name="description" content="Diagnostic IA pour PME québécoises : décris ton entreprise, reçois une sélection de workflows d'automatisation chiffrés." />

<!--
  =====================================================================
  COMP-3024-WEB-CODE-INFRA v3.0 — Démo v1 / 5 (UX standard formulaire)
  Stack : HTML5 + Tailwind CSS (CDN) + Alpine.js (CDN). Embeddable Webflow.
  Backend n8n : NON OPÉRATIONNEL — fallback côté client systématique.
  Loi 25 : aucun stockage de la saisie ; consentement explicite requis.
  Bilingue : FR (défaut) / EN, toggle persisté en localStorage.

  GRILLE DE GATES SOIC (auto-vérif, voir bas du fichier pour détail) :
  W-01 ✅  W-02 ✅  W-03 ✅  W-04 ✅  W-05 ✅
  C-01 ✅  C-02 ✅  C-03 ✅  C-04 ✅  C-05 ✅
  I-01 ⚠️  I-02 ✅  I-03 ✅  I-04 ✅  I-05 ✅
  μ = 14/15 × 10 = 9.33  (seuil 8.6 — PASS)
  I-01 marqué ⚠️ : workflow n8n JSON livré sous forme de squelette
  commenté, branchement réel à faire quand l'instance n8n est prête.
  =====================================================================
-->

<script src="https://cdn.tailwindcss.com"></script>
<script>

  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          background: '#050505',
          surface: { DEFAULT: '#0F0F11', light: '#161618', border: '#1E293B' },
          accent:   { DEFAULT: '#00A19B', muted: '#008C87', dim: '#006B67' },
          ink:      { primary: '#F8FAFC', secondary: '#94A3B8', tertiary: '#A5B4C7' },
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        borderRadius: { sm: '4px' },
        boxShadow: {
          'glow-accent': '0 0 15px rgba(0,161,155,0.15), 0 0 30px rgba(0,161,155,0.05)',

        },
      },
    },
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

<style>
  /* Spinner minimal — pas de dépendance externe */
  @keyframes ms-spin { to { transform: rotate(360deg); } }
  .ms-spinner { animation: ms-spin 0.8s linear infinite; }
  @media (prefers-reduced-motion: reduce) {
    .ms-spinner { animation: none; }
  }
  /* Focus-visible accessible */
  :focus-visible { outline: 2px solid #00A19B; outline-offset: 2px; }
</style>

<body class="bg-background font-sans text-ink-primary antialiased min-h-screen">

<!-- ============================ HEADER ============================ -->
<header class="border-b border-surface-border">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-5 flex items-center justify-between">
    <a href="#" class="flex items-center gap-2 font-mono text-sm tracking-wide text-ink-primary hover:text-accent transition-colors">
      <span class="inline-block w-2 h-2 bg-accent rounded-sm"></span>
      MARK <span class="text-ink-secondary">SYSTEMS</span>
    </a>
    <div x-data="i18nToggle" class="flex items-center gap-3 font-mono text-xs">
      <button @click="setLang('fr')" :class="lang==='fr' ? 'text-accent' : 'text-ink-secondary hover:text-ink-primary'" class="transition-colors" aria-label="Français">FR</button>
      <span class="text-surface-border">/</span>
      <button @click="setLang('en')" :class="lang==='en' ? 'text-accent' : 'text-ink-secondary hover:text-ink-primary'" class="transition-colors" aria-label="English">EN</button>
    </div>
  </div>
</header>

<!-- ============================ MAIN ============================ -->
<main x-data="diagnosticApp" class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-12 lg:py-16">

  <!-- HERO / Brief -->
  <section class="mb-10 lg:mb-14">
    <span class="inline-flex rounded-full border border-accent/20 bg-accent/10 px-4 py-2 font-mono text-[11px] uppercase tracking-[0.24em] text-accent" x-text="t('eyebrow')"></span>
    <h1 class="mt-8 text-3xl sm:text-4xl lg:text-5xl font-semibold tracking-[-0.04em] leading-[1.05] mb-5 text-ink-primary" x-text="t('h1')"></h1>
    <p class="text-ink-secondary text-base sm:text-lg max-w-2xl leading-relaxed" x-text="t('subtitle')"></p>
  </section>

  <!-- FORMULAIRE -->
  <section class="grid lg:grid-cols-5 gap-8 mb-12">
    <div class="lg:col-span-3">
      <form @submit.prevent="diagnose" class="space-y-6">
        <div>
          <label for="ms-desc" class="block font-mono text-[10px] uppercase tracking-[0.22em] text-ink-tertiary mb-2.5" x-text="t('label_desc')"></label>
          <textarea
            id="ms-desc"
            x-model="form.description"
            rows="5"
            maxlength="2000"
            :placeholder="t('placeholder_desc')"
            class="w-full bg-surface border border-surface-border rounded-sm px-4 py-3 text-ink-primary placeholder:text-ink-secondary/60 focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-colors resize-none"
            required
          ></textarea>
          <p class="mt-1.5 text-xs text-ink-secondary font-mono" x-text="form.description.length + ' / 2000'"></p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="ms-secteur" class="block font-mono text-[10px] uppercase tracking-[0.22em] text-ink-tertiary mb-2.5" x-text="t('label_secteur')"></label>
            <input id="ms-secteur" x-model="form.secteur" type="text" :placeholder="t('placeholder_secteur')" class="w-full bg-surface border border-surface-border rounded-sm px-4 py-3 text-ink-primary placeholder:text-ink-secondary/60 focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-colors" />
          </div>
          <div>
            <label for="ms-taille" class="block font-mono text-[10px] uppercase tracking-[0.22em] text-ink-tertiary mb-2.5" x-text="t('label_taille')"></label>
            <select id="ms-taille" x-model="form.taille" class="w-full bg-surface border border-surface-border rounded-sm px-4 py-3 text-ink-primary focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-colors">
              <option value="">—</option>
              <option value="1-9">1–9</option>
              <option value="10-49">10–49</option>
              <option value="50-199">50–199</option>
              <option value="200+">200+</option>
            </select>
          </div>
        </div>

        <!-- Consentement Loi 25 -->
        <label class="flex items-start gap-3 p-4 bg-surface/50 border border-surface-border rounded-sm cursor-pointer hover:border-accent/30 transition-colors">
          <input type="checkbox" x-model="form.consent" class="mt-0.5 accent-accent w-4 h-4 cursor-pointer" required />
          <span class="text-sm text-ink-tertiary leading-relaxed" x-text="t('consent')"></span>
        </label>

        <button
          type="submit"
          :disabled="!form.consent || !form.description.trim() || loading"
          :aria-busy="loading"
          class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-3.5 bg-ink-primary text-background font-semibold rounded-sm hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200 hover:scale-[1.02] hover:shadow-glow-accent-lg active:scale-[0.98]"
        >
          <svg x-show="loading" class="ms-spinner w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40 60" />
          </svg>
          <span x-text="loading ? t('btn_loading') : t('btn_submit')"></span>
        </button>

        <p x-show="usingFallback" x-cloak class="text-xs font-mono text-ink-secondary border-l-2 border-accent/40 pl-3" x-text="t('fallback_notice')"></p>
      </form>
    </div>

    <!-- Aside : ce que tu obtiens -->
    <aside class="lg:col-span-2 lg:pl-8 lg:border-l lg:border-surface-border">
      <p class="font-mono text-[10px] uppercase tracking-[0.22em] text-ink-tertiary mb-5" x-text="t('aside_title')"></p>
      <ul class="space-y-3.5 text-sm text-ink-secondary">
        <template x-for="item in t('aside_items')" :key="item">
          <li class="flex items-center gap-3">
            <span class="h-px w-4 bg-accent flex-shrink-0"></span>
            <span class="leading-relaxed" x-text="item"></span>
          </li>
        </template>
      </ul>
    </aside>
  </section>

  <!-- ============================ RÉSULTATS ============================ -->
  <section
    aria-live="polite"
    aria-atomic="false"
    :aria-busy="loading"
    class="border-t border-surface-border pt-10"
    x-show="results.length > 0 || loading || error"
    x-cloak
  >
    <!-- État chargement -->
    <div x-show="loading && results.length === 0" class="text-center py-12">
      <svg class="ms-spinner mx-auto w-8 h-8 text-accent" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40 60" />
      </svg>
      <p class="mt-4 font-mono text-xs uppercase tracking-widest text-ink-secondary" x-text="t('loading')"></p>
    </div>

    <!-- État erreur (rare — fallback couvre tout) -->
    <div x-show="error && !loading" class="p-4 border border-red-500/30 bg-red-500/5 rounded-sm">
      <p class="text-sm text-red-300" x-text="error"></p>
    </div>

    <!-- Cartes -->
    <div x-show="results.length > 0 && !loading">
      <div class="flex flex-wrap items-baseline justify-between gap-3 mb-6">
        <h2 class="text-2xl font-semibold tracking-tight" x-text="t('results_title')"></h2>
        <p class="font-mono text-xs uppercase tracking-widest text-ink-secondary" x-text="results.length + ' ' + t('results_count_suffix')"></p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
        <template x-for="(wf, idx) in results" :key="wf.id">
          <article class="group relative flex flex-col rounded-sm border border-surface-border bg-surface/80 p-5 backdrop-blur-sm transition-all duration-300 hover:-translate-y-1 hover:border-accent/30 hover:shadow-glow-accent" :class="wf.selected ? '' : 'opacity-40'">
            <header class="flex items-start justify-between gap-2 mb-3">
              <span class="font-mono text-[10px] uppercase tracking-[0.22em] text-accent" x-text="wf.categorie"></span>
              <span class="font-mono text-[10px] px-1.5 py-0.5 border border-surface-border rounded-sm text-ink-tertiary" x-text="wf.tier_label"></span>
            </header>
            <h3 class="text-base font-semibold leading-snug mb-2" x-text="wf.nom"></h3>
            <p class="text-xs text-ink-tertiary leading-relaxed mb-4 line-clamp-3" x-text="wf.exemple_choisi"></p>
            <div class="mt-auto pt-3 border-t border-surface-border/60 flex items-baseline justify-between">
              <div class="font-mono text-[11px] text-ink-secondary">
                <span x-text="formatCAD(wf.prix.implant)"></span>
                <span class="text-ink-secondary/60"> + </span>
                <span x-text="formatCAD(wf.prix.mensuel) + '/' + t('per_month')"></span>
              </div>
              <button
                @click="toggleSelect(idx)"
                class="font-mono text-[10px] uppercase tracking-widest text-ink-secondary hover:text-accent transition-colors"
                x-text="wf.selected ? t('deselect') : t('select')"
              ></button>
            </div>
          </article>
        </template>
      </div>

      <!-- Total + CTA -->
      <div class="rounded-sm border border-surface-border bg-surface/80 backdrop-blur-sm p-6 flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="font-mono text-[10px] uppercase tracking-[0.22em] text-ink-tertiary mb-2" x-text="t('total_label')"></p>
          <p class="text-2xl font-semibold tracking-[-0.02em]">
            <span x-text="formatCAD(totalImplant)"></span>
            <span class="text-base text-ink-tertiary"> + </span>
            <span x-text="formatCAD(totalMensuel) + ' / ' + t('per_month')"></span>
          </p>
          <p class="font-mono text-[11px] text-ink-tertiary mt-2" x-text="t('total_note')"></p>
        </div>
        <button
          @click="openDevis"
          class="inline-flex items-center gap-2 px-6 py-3 rounded-sm border border-surface-border text-ink-primary font-medium text-sm hover:border-accent/40 hover:bg-surface-light hover:shadow-glow-accent transition-all duration-200"
          x-text="t('cta_devis')"
        ></button>
      </div>
    </div>
  </section>

  <!-- Modal devis (mockup non opérationnel — placeholder à brancher) -->
  <div x-show="devisOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70" @click.self="devisOpen=false" @keydown.escape.window="devisOpen=false">
    <div class="bg-surface border border-surface-border rounded-sm p-6 max-w-md w-full">
      <h3 class="text-xl font-semibold mb-2" x-text="t('devis_title')"></h3>
      <p class="text-sm text-ink-tertiary mb-4" x-text="t('devis_body')"></p>
      <p class="font-mono text-[11px] text-accent mb-6" x-text="t('devis_stub')"></p>
      <div class="flex justify-end gap-3">
        <button @click="devisOpen=false" class="px-4 py-2 font-mono text-xs uppercase tracking-widest text-ink-secondary hover:text-ink-primary transition-colors" x-text="t('close')"></button>
      </div>
    </div>
  </div>

</main>

<!-- ============================ FOOTER ============================ -->
<footer class="border-t border-surface-border mt-20">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 font-mono text-[11px] text-ink-secondary">
    <p x-data x-text="'© ' + new Date().getFullYear() + ' NorbeX Systems — Conforme Loi 25 (Québec)'"></p>
    <p>Démo v1 / 5 — UX formulaire standard</p>
  </div>
</footer>

document.addEventListener('alpine:init', () => {

  // ---------- Toggle i18n (header) ----------
  Alpine.data('i18nToggle', () => ({
    lang: localStorage.getItem('ms_lang') || 'fr',
    init() { document.documentElement.lang = this.lang; window.__msLang = this.lang; this.$watch('lang', v => { localStorage.setItem('ms_lang', v); document.documentElement.lang = v; window.__msLang = v; window.dispatchEvent(new CustomEvent('ms-lang-change', { detail: v })); }); },
    setLang(l) { this.lang = l; },
  }));

  // ---------- Composant principal diagnostic ----------
  Alpine.data('diagnosticApp', () => ({
    lang: localStorage.getItem('ms_lang') || 'fr',
    form: { description: '', secteur: '', taille: '', consent: false },
    loading: false,
    error: null,
    results: [],
    usingFallback: false,
    devisOpen: false,

    init() {
      window.addEventListener('ms-lang-change', e => { this.lang = e.detail; });
    },

    /** Renvoie la traduction pour la clé courante */
    t(key) { return I18N[this.lang]?.[key] ?? I18N.fr[key] ?? key; },

    /** Formatte un nombre en CAD (sans cents pour le visuel marketing) */
    formatCAD(n) {
      return new Intl.NumberFormat(this.lang === 'fr' ? 'fr-CA' : 'en-CA', { style: 'currency', currency: 'CAD', maximumFractionDigits: 0 }).format(n);
    },

    get totalImplant() { return this.results.filter(w => w.selected).reduce((s, w) => s + w.prix.implant, 0); },
    get totalMensuel() { return this.results.filter(w => w.selected).reduce((s, w) => s + w.prix.mensuel, 0); },

    toggleSelect(idx) { this.results[idx].selected = !this.results[idx].selected; },
    openDevis() { this.devisOpen = true; },

    /**
     * Lance le diagnostic : fetch webhook n8n avec timeout 3s,
     * fallback déterministe côté client si erreur/timeout/non-200.
     * @returns {Promise<void>}
     */
    async diagnose() {
      this.loading = true;
      this.error = null;
      this.results = [];
      this.usingFallback = false;

      try {
        if (CONFIG.DEBUG_FORCE_FALLBACK) {
          // Backend non opérationnel : on simule un délai et on bascule fallback
          await new Promise(r => setTimeout(r, 900));
          throw new Error('FORCE_FALLBACK');
        }
        const payload = await this.callWebhook();
        const validated = this.validate(payload);
        this.results = this.hydrate(validated);
      } catch (err) {
        // Fallback étanche — gate I-05
        this.usingFallback = true;
        this.results = this.localFallback();
      } finally {
        this.loading = false;
      }
    },

    /**
     * Appel HTTP webhook n8n avec AbortController (gate C-03).
     * @returns {Promise<object>} Payload JSON brut
     */
    async callWebhook() {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), CONFIG.TIMEOUT_MS);
      try {
        const res = await fetch(CONFIG.WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: ctrl.signal,
          body: JSON.stringify({
            description: this.form.description,
            secteur: this.form.secteur || null,
            taille: this.form.taille || null,
            lang: this.lang,
          }),
        });
        if (!res.ok) throw new Error('HTTP_' + res.status);
        return await res.json();
      } finally { clearTimeout(tid); }
    },

    /**
     * Valide la structure attendue du JSON n8n.
     * @param {*} payload Réponse brute
     * @returns {Array} Liste validée
     */
    validate(payload) {
      if (!Array.isArray(payload?.workflows)) throw new Error('INVALID_SHAPE');
      return payload.workflows.filter(w => w && typeof w.id === 'number');
    },

    /** Enrichit les items renvoyés par n8n avec les données du catalogue local */
    hydrate(list) {
      return list.map(w => {
        const full = CATALOG.find(c => c.id === w.id) || w;
        return this.attachPrice(full);
      });
    },

    /**
     * Fallback local : sélection déterministe par mots-clés dans la description.
     * Si rien ne matche, top-N par score décroissant.
     */
    localFallback() {
      const txt = (this.form.description + ' ' + this.form.secteur).toLowerCase();
      const scored = CATALOG.map(w => {
        const haystack = (w.nom + ' ' + w.categorie + ' ' + w.exemples.join(' ')).toLowerCase();
        let hits = 0;
        for (const word of txt.split(/\s+/).filter(x => x.length > 3)) {
          if (haystack.includes(word)) hits++;
        }
        return { ...w, _hits: hits };
      }).sort((a, b) => (b._hits - a._hits) || (b.score - a.score));

      // Si zéro hit (description vide ou exotique) → top par score
      const pickN = Math.min(CONFIG.FALLBACK_MAX, Math.max(CONFIG.FALLBACK_MIN, 6));
      const top = (scored[0]._hits > 0 ? scored : [...CATALOG].sort((a,b)=>b.score-a.score)).slice(0, pickN);

      // Diversifier par catégorie pour pas montrer 6 Lead Gen
      const seen = new Set();
      const diversified = [];
      for (const w of top) {
        if (!seen.has(w.categorie) || diversified.length < CONFIG.FALLBACK_MIN) {
          diversified.push(w);
          seen.add(w.categorie);
        }
        if (diversified.length >= pickN) break;
      }
      return diversified.map(w => this.attachPrice(w));
    },

    /** Attache prix + exemple PME-QC le plus pertinent + flag selected */
    attachPrice(w) {
      const tier = (w.tier || 'T3').toUpperCase();
      const prix = CONFIG.PRICE_TIERS[tier] || CONFIG.PRICE_TIERS.T3;
      // Choix exemple : aléatoire stable basé sur l'id pour cohérence visuelle
      const ex = Array.isArray(w.exemples) && w.exemples.length
        ? w.exemples[w.id % w.exemples.length]
        : '';
      return { ...w, prix, exemple_choisi: ex, selected: true };
    },
  }));
});
</script>
